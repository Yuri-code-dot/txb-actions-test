name: TXB Collector

on:
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install requests

      - name: Run Collector
        run: |
          python collect.py

      - name: Commit Dataset
        run: |
          git config --global user.name "TXB Collector Bot"
          git config --global user.email "actions@github.com"

          git add datasets/

          git diff --staged --quiet || git commit -m "TXB dataset update"

      - name: Push Dataset
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
